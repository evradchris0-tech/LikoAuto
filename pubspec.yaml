name: liko_auto
description: "Liko Auto - Plateforme automobile"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  drift: ^2.20.0
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_storage: ^13.3.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_map: ^7.0.2
  flutter_riverpod: ^2.6.1
  flutter_staggered_animations: ^1.1.1
  geolocator: ^14.0.2
  go_router: ^17.2.2
  google_fonts: ^8.1.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  latlong2: ^0.9.1
  local_auth: ^2.3.0
  lucide_icons: ^0.257.0
  package_info_plus: ^9.0.1
  path: ^1.9.0
  path_provider: ^2.1.5
  riverpod_annotation: ^2.6.1
