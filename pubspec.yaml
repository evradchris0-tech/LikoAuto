name: liko_auto
description: "Liko Auto - Plateforme automobile"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_storage: ^13.3.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^2.6.1
  flutter_staggered_animations: ^1.1.1
  geolocator: ^14.0.2
  go_router: ^17.2.2
  google_fonts: ^8.1.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  package_info_plus: ^9.0.1
  riverpod_annotation: ^2.6.1
  shared_preferences: ^2.3.2
  # HTTP client
  dio: ^5.7.0
  # Local persistence
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  path_provider: ^2.1.5
  # Biométrie
  local_auth: ^2.3.0
  # Cartographie OSM
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.4.13
  custom_lint: ^0.7.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  very_good_analysis: ^7.0.0
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "IMAGE/logoL.jpeg"
