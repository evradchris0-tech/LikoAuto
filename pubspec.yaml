  socket_io_client: ^3.1.4
  sqlite3_flutter_libs: ^0.5.24
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: ^2.4.13
  custom_lint: ^0.7.0
  drift_dev: ^2.20.0
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
